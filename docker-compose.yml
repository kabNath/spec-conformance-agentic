version: "3.9"
services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: conformance
    ports: ["5432:5432"]
    volumes: ["pgdata:/var/lib/postgresql/data"]

  qdrant:
    image: qdrant/qdrant:latest
    ports: ["6333:6333"]
    volumes: ["qdrantdata:/qdrant/storage"]

  neo4j:
    image: neo4j:5
    environment:
      NEO4J_AUTH: neo4j/password
    ports: ["7474:7474", "7687:7687"]
    volumes: ["neo4jdata:/data"]

  vidimus:
    build: ./vidimus-svc
    ports: ["4319:4319"]
    volumes: ["vidimusdata:/data"]

volumes:
  pgdata:
  qdrantdata:
  neo4jdata:
  vidimusdata:
